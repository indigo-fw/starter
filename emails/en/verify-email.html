<!-- subject: Welcome! Please verify your email -->
<!-- preheader: One quick step to activate your account -->
<h1 style="margin:0 0 16px; font-size:24px; color:#111827">Welcome to {{siteName}}!</h1>
<p style="margin:0 0 16px; color:#4b5563; line-height:1.6">
  Hi {{name}}, your account is ready. Please verify your email address to keep full access. Just click the button below:
</p>
<a href="{{{verifyUrl}}}" style="display:inline-block; background:{{brandColor}}; color:white; padding:12px 24px; border-radius:6px; text-decoration:none; font-weight:500">
  Verify Email
</a>
<p style="margin:24px 0 0; color:#9ca3af; font-size:13px; line-height:1.5">
  If you didn't create this account, you can safely ignore this email.
</p>
