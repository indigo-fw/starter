<!-- subject: Your subscription has been canceled -->
<!-- preheader: Your {{planName}} plan has been canceled due to non-payment -->
<h2 style="margin:0 0 16px; font-size:22px; color:#111827">Subscription Canceled</h2>
<p style="margin:0 0 16px; color:#4b5563; line-height:1.6">
  Your <strong>{{planName}}</strong> plan has been canceled due to non-payment. Your account has been downgraded to the free plan.
</p>
<p style="margin:0 0 24px; color:#4b5563; line-height:1.6">
  You can resubscribe at any time to regain access to premium features.
</p>
<a href="{{{billingUrl}}}" style="display:inline-block; background:{{brandColor}}; color:white; padding:12px 24px; border-radius:6px; text-decoration:none; font-weight:500">
  Resubscribe
</a>
