<!-- subject: Payment failed for your subscription -->
<!-- preheader: Please update your payment method -->
<h2 style="margin:0 0 16px; font-size:22px; color:#111827">Payment Failed</h2>
<p style="margin:0 0 16px; color:#4b5563; line-height:1.6">
  We were unable to process your payment. Please update your payment method to keep your subscription active.
</p>
<a href="{{{billingUrl}}}" style="display:inline-block; background:{{brandColor}}; color:white; padding:12px 24px; border-radius:6px; text-decoration:none; font-weight:500">
  Update Payment Method
</a>
<p style="margin:24px 0 0; color:#9ca3af; font-size:14px">
  If your payment method has expired, please add a new one.
</p>
