<!-- subject: You've been invited to join {{organizationName}} -->
<!-- preheader: Accept the invitation to start collaborating -->
<h1 style="margin:0 0 16px; font-size:24px; color:#111827">You've been invited!</h1>
<p style="margin:0 0 16px; color:#4b5563; line-height:1.6">
  You've been invited to join <strong>{{organizationName}}</strong>.
</p>
<p style="margin:0 0 24px; color:#4b5563; line-height:1.6">
  Click below to accept the invitation and start collaborating:
</p>
<a href="{{{inviteUrl}}}" style="display:inline-block; background:{{brandColor}}; color:white; padding:12px 24px; border-radius:6px; text-decoration:none; font-weight:500">
  Accept Invitation
</a>
<p style="margin:24px 0 0; color:#9ca3af; font-size:14px; line-height:1.6">
  If you didn't expect this invitation, you can safely ignore this email.
</p>
