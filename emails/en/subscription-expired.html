<!-- subject: Your subscription has expired -->
<!-- preheader: Your {{planName}} plan has been downgraded -->
<h2 style="margin:0 0 16px; font-size:22px; color:#111827">Subscription Expired</h2>
<p style="margin:0 0 16px; color:#4b5563; line-height:1.6">
  Your <strong>{{planName}}</strong> plan has expired. Your account has been downgraded to the free plan.
</p>
<p style="margin:0 0 24px; color:#4b5563; line-height:1.6">
  Renew now to regain access to all premium features.
</p>
<a href="{{{billingUrl}}}" style="display:inline-block; background:{{brandColor}}; color:white; padding:12px 24px; border-radius:6px; text-decoration:none; font-weight:500">
  Renew Subscription
</a>
