<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indigo Code Map — {{MODULE_ID}}</title>
<style>
  :root {
    --bg: #0f0f14;
    --surface: #16161e;
    --surface2: #1e1e2a;
    --surface3: #262636;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #7878a0;
    --brand: #818cf8;
    --accent: #c084fc;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --cyan: #22d3ee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  .top-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .top-bar h1 { font-size: 16px; font-weight: 600; color: var(--brand); }
  .top-bar .meta { font-size: 11px; color: var(--text-dim); }
  .top-bar .stats {
    display: flex;
    gap: 12px;
    margin-left: auto;
  }
  .top-bar .stat {
    font-size: 12px;
    color: var(--text-dim);
  }
  .top-bar .stat strong {
    color: var(--brand);
    font-size: 14px;
  }

  .main {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Graph ── */
  #cy {
    flex: 1;
    min-width: 0;
    background: var(--bg);
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 320px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-header input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
  }
  .sidebar-header input:focus { border-color: var(--brand); }
  .sidebar-header input::placeholder { color: var(--text-dim); }

  .sidebar-controls {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .filter-btn {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    transition: all 0.15s;
  }
  .filter-btn.active { border-color: var(--brand); color: var(--brand); background: #1a1a3a; }
  .filter-btn:hover { border-color: var(--text-dim); }

  .layout-btn {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    margin-left: auto;
  }
  .layout-btn:hover { border-color: var(--text-dim); color: var(--text); }

  .sidebar-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    font-size: 13px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .detail-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    word-break: break-all;
  }
  .detail-path {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 12px;
    word-break: break-all;
  }
  .detail-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    margin-right: 4px;
  }
  .detail-section {
    margin-top: 14px;
  }
  .detail-section h4 {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .detail-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
    font-size: 12px;
  }
  .detail-item .kind {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .kind-function { background: #1a2a3a; color: var(--blue); }
  .kind-component { background: #2a1a3a; color: var(--accent); }
  .kind-const { background: #1a3a2a; color: var(--green); }
  .kind-type, .kind-interface { background: #2a2a1a; color: var(--yellow); }
  .kind-class { background: #3a1a1a; color: var(--red); }
  .kind-enum { background: #1a3a3a; color: var(--cyan); }
  .detail-item .name { color: var(--text); }
  .detail-item .line { color: var(--text-dim); font-size: 10px; margin-left: auto; }
  .import-item {
    font-size: 12px;
    padding: 3px 0;
    color: var(--text-dim);
    cursor: pointer;
  }
  .import-item:hover { color: var(--brand); }
  .import-item .arrow { color: var(--brand); margin-right: 4px; }

  .empty-state {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 40px 20px;
  }
  .empty-state p { margin-bottom: 8px; }
  .empty-state kbd {
    background: var(--surface3);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 11px;
  }

  /* ── Type colors (used by Cytoscape and badges) ── */
  .badge-component { background: #2a1a3a; color: var(--accent); }
  .badge-router { background: #1a2a3a; color: var(--blue); }
  .badge-schema { background: #1a3a2a; color: var(--green); }
  .badge-lib { background: #2a2a1a; color: var(--yellow); }
  .badge-config { background: #3a2a1a; color: var(--yellow); }
  .badge-style { background: #1a3a3a; color: var(--cyan); }
  .badge-type { background: #2a2a1a; color: var(--yellow); }
  .badge-other { background: var(--surface3); color: var(--text-dim); }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Code Map</h1>
  <span class="meta">{{MODULE_ID}}</span>
  <div class="stats">
    <div class="stat"><strong>{{FILE_COUNT}}</strong> files</div>
    <div class="stat"><strong>{{EXPORT_COUNT}}</strong> exports</div>
    <div class="stat"><strong>{{EDGE_COUNT}}</strong> imports</div>
  </div>
</div>

<div class="main">
  <div id="cy"></div>

  <div class="sidebar">
    <div class="sidebar-header">
      <input id="search" type="text" placeholder="Search files, exports..." />
    </div>
    <div class="sidebar-controls">
      <button class="filter-btn active" data-type="all">All</button>
      <button class="filter-btn" data-type="component">Components</button>
      <button class="filter-btn" data-type="router">Routers</button>
      <button class="filter-btn" data-type="schema">Schema</button>
      <button class="filter-btn" data-type="lib">Lib</button>
      <button class="filter-btn" data-type="style">CSS</button>
      <button class="layout-btn" id="btn-relayout" title="Re-layout">Layout</button>
    </div>
    <div class="sidebar-content" id="detail-panel">
      <div class="empty-state">
        <p>Click a node to inspect</p>
        <p>Scroll to zoom, drag to pan</p>
        <p><kbd>Shift+Click</kbd> to expand/collapse directories</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.4/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
<script>
// Register dagre layout
try {
  if (typeof cytoscapeDagre !== 'undefined') cytoscape.use(cytoscapeDagre);
} catch(e) {}

const graphData = {{GRAPH_DATA}};

// ── Build Cytoscape elements ──
const elements = [];
const fileMap = new Map();
const typeColors = {
  component: '#c084fc',
  router: '#60a5fa',
  schema: '#4ade80',
  lib: '#fbbf24',
  config: '#fbbf24',
  style: '#22d3ee',
  type: '#fbbf24',
  other: '#7878a0',
};

// Add directory compound nodes
for (const dir of graphData.directories) {
  const parent = dir.includes('/') ? dir.substring(0, dir.lastIndexOf('/')) : undefined;
  elements.push({
    group: 'nodes',
    data: {
      id: 'dir:' + dir,
      label: dir.split('/').pop(),
      parent: parent ? 'dir:' + parent : undefined,
      isDir: true,
    },
  });
}

// Add file nodes
for (const node of graphData.nodes) {
  fileMap.set(node.id, node);
  const exportCount = node.exports.length;
  const label = node.label.replace(/\.(ts|tsx)$/, '');

  elements.push({
    group: 'nodes',
    data: {
      id: node.id,
      label: exportCount > 0 ? label + ' (' + exportCount + ')' : label,
      parent: node.dir ? 'dir:' + node.dir : undefined,
      fileType: node.type,
      exportCount,
      lines: node.lines,
      color: typeColors[node.type] || typeColors.other,
    },
  });
}

// Add edges (only for resolved internal imports)
const allIds = new Set(graphData.nodes.map(n => n.id));
for (const node of graphData.nodes) {
  for (const edge of node.importEdges) {
    if (!allIds.has(edge.target)) continue;
    elements.push({
      group: 'edges',
      data: {
        id: node.id + '>' + edge.target,
        source: node.id,
        target: edge.target,
        label: edge.names.length <= 2 ? edge.names.join(', ') : edge.names.length + ' imports',
        isTypeOnly: edge.isTypeOnly,
      },
    });
  }
  // CSS import edges
  for (const css of node.cssImports) {
    // Try to find the CSS file in our nodes
    for (const n of graphData.nodes) {
      if (n.type === 'style' && (css.endsWith(n.label) || n.id.endsWith(css.replace('./', '')))) {
        elements.push({
          group: 'edges',
          data: {
            id: node.id + '>css:' + n.id,
            source: node.id,
            target: n.id,
            label: 'style',
            isCss: true,
          },
        });
        break;
      }
    }
  }
}

// ── Init Cytoscape ──
const cy = cytoscape({
  container: document.getElementById('cy'),
  elements,
  minZoom: 0.1,
  maxZoom: 4,
  style: [
    // Directory compound nodes
    {
      selector: 'node[?isDir]',
      style: {
        'label': 'data(label)',
        'text-valign': 'top',
        'text-halign': 'center',
        'font-size': '11px',
        'color': '#7878a0',
        'background-color': '#16161e',
        'border-color': '#2a2a3a',
        'border-width': 1,
        'padding': '16px',
        'shape': 'round-rectangle',
        'text-margin-y': '-6px',
        'font-weight': 600,
      },
    },
    // File nodes
    {
      selector: 'node[!isDir]',
      style: {
        'label': 'data(label)',
        'text-valign': 'center',
        'text-halign': 'center',
        'font-size': '10px',
        'color': '#e0e0e8',
        'background-color': 'data(color)',
        'background-opacity': 0.15,
        'border-color': 'data(color)',
        'border-width': 1.5,
        'width': 'label',
        'height': '28px',
        'padding': '8px',
        'shape': 'round-rectangle',
        'text-wrap': 'none',
      },
    },
    // Highlighted node
    {
      selector: 'node.highlight',
      style: {
        'border-width': 3,
        'background-opacity': 0.3,
        'z-index': 10,
      },
    },
    // Faded node
    {
      selector: 'node.faded',
      style: {
        'opacity': 0.15,
      },
    },
    // Edges
    {
      selector: 'edge',
      style: {
        'width': 1,
        'line-color': '#3a3a5a',
        'target-arrow-color': '#3a3a5a',
        'target-arrow-shape': 'triangle',
        'arrow-scale': 0.6,
        'curve-style': 'bezier',
        'opacity': 0.5,
      },
    },
    {
      selector: 'edge[?isTypeOnly]',
      style: {
        'line-style': 'dashed',
        'line-dash-pattern': [4, 4],
        'opacity': 0.3,
      },
    },
    {
      selector: 'edge[?isCss]',
      style: {
        'line-color': '#22d3ee',
        'target-arrow-color': '#22d3ee',
        'line-style': 'dashed',
        'line-dash-pattern': [6, 3],
        'opacity': 0.5,
      },
    },
    // Highlighted edges
    {
      selector: 'edge.highlight',
      style: {
        'width': 2,
        'opacity': 1,
        'z-index': 10,
        'line-color': '#818cf8',
        'target-arrow-color': '#818cf8',
      },
    },
    {
      selector: 'edge.faded',
      style: {
        'opacity': 0.05,
      },
    },
    // Selected
    {
      selector: ':selected',
      style: {
        'border-width': 3,
        'border-color': '#818cf8',
      },
    },
  ],
});

// ── Layout ──
function runLayout() {
  const layout = cy.layout({
    name: 'dagre',
    rankDir: 'LR',
    nodeSep: 20,
    rankSep: 60,
    edgeSep: 10,
    animate: false,
    fit: true,
    padding: 30,
  });
  layout.run();
}

// Fallback layout if dagre isn't available
try {
  runLayout();
} catch(e) {
  cy.layout({ name: 'cose', animate: false, fit: true, padding: 30, nodeRepulsion: 8000 }).run();
}

// ── Detail panel ──
const detailPanel = document.getElementById('detail-panel');

function showDetail(nodeId) {
  const node = fileMap.get(nodeId);
  if (!node) return;

  const badgeClass = 'detail-badge badge-' + node.type;
  let html = '<div class="detail-title">' + node.label + '</div>';
  html += '<div class="detail-path">' + node.id + '</div>';
  html += '<span class="' + badgeClass + '">' + node.type + '</span>';
  if (node.lines > 0) html += ' <span class="detail-badge badge-other">' + node.lines + ' lines</span>';

  // Exports
  if (node.exports.length > 0) {
    html += '<div class="detail-section"><h4>Exports (' + node.exports.length + ')</h4>';
    for (const exp of node.exports) {
      html += '<div class="detail-item">';
      html += '<span class="kind kind-' + exp.kind + '">' + exp.kind + '</span>';
      html += '<span class="name">' + exp.name + (exp.isDefault ? ' (default)' : '') + '</span>';
      html += '<span class="line">:' + exp.line + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  // Imports (internal)
  const internalImports = node.importEdges.filter(e => allIds.has(e.target));
  if (internalImports.length > 0) {
    html += '<div class="detail-section"><h4>Imports (' + internalImports.length + ')</h4>';
    for (const imp of internalImports) {
      html += '<div class="import-item" data-target="' + imp.target + '">';
      html += '<span class="arrow">\u2192</span>';
      html += imp.target.split('/').pop().replace(/\.(ts|tsx)$/, '');
      if (imp.isTypeOnly) html += ' <span style="color:var(--yellow);font-size:10px">(type)</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  // CSS imports
  if (node.cssImports.length > 0) {
    html += '<div class="detail-section"><h4>Styles (' + node.cssImports.length + ')</h4>';
    for (const css of node.cssImports) {
      html += '<div class="detail-item"><span class="kind kind-enum">css</span><span class="name">' + css + '</span></div>';
    }
    html += '</div>';
  }

  // Imported by
  const importedBy = graphData.nodes.filter(n =>
    n.importEdges.some(e => e.target === nodeId)
  );
  if (importedBy.length > 0) {
    html += '<div class="detail-section"><h4>Imported by (' + importedBy.length + ')</h4>';
    for (const imp of importedBy) {
      html += '<div class="import-item" data-target="' + imp.id + '">';
      html += '<span class="arrow">\u2190</span>';
      html += imp.label.replace(/\.(ts|tsx)$/, '');
      html += '</div>';
    }
    html += '</div>';
  }

  detailPanel.innerHTML = html;

  // Click handler for import links
  detailPanel.querySelectorAll('.import-item[data-target]').forEach(el => {
    el.addEventListener('click', () => {
      const targetId = el.dataset.target;
      const targetNode = cy.getElementById(targetId);
      if (targetNode.length) {
        cy.animate({ center: { eles: targetNode }, duration: 300 });
        targetNode.select();
        selectNode(targetId);
      }
    });
  });
}

function selectNode(nodeId) {
  // Highlight connected nodes and edges
  cy.elements().removeClass('highlight faded');

  const node = cy.getElementById(nodeId);
  if (!node.length || node.data('isDir')) return;

  const connected = node.connectedEdges();
  const neighbors = connected.connectedNodes();
  const highlighted = node.union(connected).union(neighbors);

  cy.elements().addClass('faded');
  highlighted.removeClass('faded').addClass('highlight');

  showDetail(nodeId);
}

// ── Events ──
cy.on('tap', 'node[!isDir]', function(e) {
  selectNode(e.target.id());
});

cy.on('tap', function(e) {
  if (e.target === cy) {
    cy.elements().removeClass('highlight faded');
    detailPanel.innerHTML = '<div class="empty-state"><p>Click a node to inspect</p><p>Scroll to zoom, drag to pan</p></div>';
  }
});

// ── Search ──
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) {
    cy.elements().removeClass('highlight faded');
    return;
  }
  cy.elements().addClass('faded');
  cy.nodes('[!isDir]').forEach(node => {
    const file = fileMap.get(node.id());
    if (!file) return;
    const match = file.id.toLowerCase().includes(q) ||
      file.label.toLowerCase().includes(q) ||
      file.exports.some(e => e.name.toLowerCase().includes(q));
    if (match) {
      node.removeClass('faded').addClass('highlight');
      node.connectedEdges().removeClass('faded');
    }
  });
});

// ── Type filters ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const type = btn.dataset.type;

    if (type === 'all') {
      cy.nodes('[!isDir]').style('display', 'element');
      cy.edges().style('display', 'element');
    } else {
      cy.nodes('[!isDir]').forEach(node => {
        const show = node.data('fileType') === type;
        node.style('display', show ? 'element' : 'none');
      });
      cy.edges().forEach(edge => {
        const srcVisible = cy.getElementById(edge.data('source')).style('display') !== 'none';
        const tgtVisible = cy.getElementById(edge.data('target')).style('display') !== 'none';
        edge.style('display', srcVisible && tgtVisible ? 'element' : 'none');
      });
    }
  });
});

// ── Re-layout button ──
document.getElementById('btn-relayout').addEventListener('click', () => {
  try { runLayout(); } catch(e) {
    cy.layout({ name: 'cose', animate: false, fit: true, padding: 30 }).run();
  }
});
</script>

</body>
</html>
