<!-- subject: Reset your {{siteName}} password -->
<!-- preheader: Click the link to set a new password -->
<h1 style="margin:0 0 8px; font-size:26px; color:#111827; font-weight:700">Reset Your Password</h1>
<p style="margin:0 0 24px; color:#6b7280; font-size:14px">We received a request to reset your password for <strong>{{siteName}}</strong>.</p>

<p style="margin:0 0 16px; color:#4b5563; font-size:14px; line-height:1.6">
  Click the button below to set a new password. This link expires in 1 hour.
</p>

<a href="{{{resetUrl}}}" style="display:inline-block; background:{{brandColor}}; color:white; padding:14px 28px; border-radius:8px; text-decoration:none; font-weight:600; font-size:14px">
  Reset Password →
</a>

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin:24px 0 0">
  <tr>
    <td style="background:#fef3c7; border-radius:8px; padding:12px 16px; border-left:3px solid #f59e0b">
      <p style="margin:0; font-size:12px; color:#92400e">
        ⚠️ If you didn't request this, ignore this email. Your password won't change.
      </p>
    </td>
  </tr>
</table>
