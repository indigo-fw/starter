<!-- subject: Verify your email for {{siteName}} -->
<!-- preheader: One quick step to activate your account -->
<h1 style="margin:0 0 8px; font-size:26px; color:#111827; font-weight:700">Verify Your Email</h1>
<p style="margin:0 0 24px; color:#6b7280; font-size:14px">Hi {{name}}, one quick step to activate your account.</p>

<p style="margin:0 0 16px; color:#4b5563; font-size:14px; line-height:1.6">
  Please verify your email address to unlock all features of <strong>{{siteName}}</strong>.
</p>

<a href="{{{verifyUrl}}}" style="display:inline-block; background:{{brandColor}}; color:white; padding:14px 28px; border-radius:8px; text-decoration:none; font-weight:600; font-size:14px">
  Verify Email →
</a>

<p style="margin:24px 0 0; font-size:12px; color:#9ca3af; line-height:1.5">
  If you didn't create this account, you can safely ignore this email.
</p>
