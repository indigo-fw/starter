<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{SITE_NAME}}</title>
</head>
<body style="-ms-text-size-adjust:100%; -webkit-text-size-adjust:100%; background-color:#f9fafb; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin:0; padding:0; width:100%" bgcolor="#f9fafb" width="100%">
  {{PREHEADER_BLOCK}}
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-spacing:0; mso-table-lspace:0; mso-table-rspace:0">
    <tr>
      <td align="center" style="padding:40px 20px">
        <table role="presentation" style="border-spacing:0; mso-table-lspace:0; mso-table-rspace:0; background-color:#ffffff; border:1px solid #e5e7eb; border-radius:8px; margin:0 auto; max-width:600px; width:100%" bgcolor="#ffffff" width="100%">
          <tr>
            <td style="border-bottom:1px solid #e5e7eb; padding:20px 32px; text-align:center" align="center">
              {{HEADER_BLOCK}}
            </td>
          </tr>
          <tr>
            <td style="font-size:16px; line-height:1.6; padding:32px; color:#374151; text-align:left" align="left">
{{CONTENT}}
            </td>
          </tr>
        </table>
        <p style="margin:24px 0 0; text-align:center; color:#9ca3af; font-size:12px">
          <a href="{{SITE_URL}}" style="color:#9ca3af; text-decoration:none">{{SITE_NAME}}</a>
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
