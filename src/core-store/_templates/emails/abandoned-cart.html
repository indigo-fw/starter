<!-- subject: You left something in your cart -->
<!-- preheader: Complete your order before your items are gone -->
<h1 style="margin:0 0 8px; font-size:26px; color:#111827; font-weight:700">You Left Something Behind</h1>
<p style="margin:0 0 24px; color:#6b7280; font-size:14px">You have items waiting in your cart. Complete your order before they're gone!</p>

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin:0 0 24px">
  <tr>
    <td style="background:#f3f4f6; border-radius:8px; padding:20px">
      <p style="margin:0 0 4px; font-size:13px; font-weight:600; color:#374151">Your Cart</p>
      <p style="margin:0; font-size:13px; color:#6b7280">{{itemSummary}}</p>
    </td>
  </tr>
</table>

<a href="{{{appUrl}}}/cart" style="display:inline-block; background:{{brandColor}}; color:white; padding:14px 28px; border-radius:8px; text-decoration:none; font-weight:600; font-size:14px">
  Complete Your Order →
</a>

<p style="margin:24px 0 0; font-size:13px; color:#9ca3af">
  If you have any questions, reply to this email.
</p>
